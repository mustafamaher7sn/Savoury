<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savoury | Bakery &amp; Cafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon-deep:#360d18;
    --maroon:#5c1826;
    --maroon-light:#7a2534;
    --cream:#f3ddbb;
    --cream-dim:#d8b98d;
    --shadow-glow: rgba(243,221,187,0.35);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--maroon-deep);
    font-family:'Cairo', sans-serif;
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:
      radial-gradient(ellipse 900px 600px at 20% 0%, rgba(122,37,52,0.55), transparent 60%),
      radial-gradient(ellipse 900px 700px at 85% 100%, rgba(122,37,52,0.5), transparent 60%),
      linear-gradient(160deg, var(--maroon) 0%, var(--maroon-deep) 55%, #2a0a12 100%);
  }

  /* soft diagonal light streaks echoing the original brand texture */
  body::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      115deg,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 40px,
      transparent 40px,
      transparent 140px
    );
    pointer-events:none;
    mix-blend-mode:overlay;
  }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width:560px;
    padding:56px 28px 64px;
    text-align:center;
  }

  .logo-wrap{
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.1s;
  }

  .logo-wrap img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    filter: drop-shadow(0 8px 30px rgba(0,0,0,0.35));
  }

  .tagline{
    color:var(--cream-dim);
    font-size:15px;
    letter-spacing:0.5px;
    margin-top:6px;
    margin-bottom:38px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.35s;
    font-weight:400;
  }

  .divider{
    width:100%;
    max-width:220px;
    margin:0 auto 40px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.5s;
  }
  .divider svg{ width:100%; height:auto; display:block; }
  .divider path, .divider line{
    stroke:var(--cream-dim);
    fill:none;
  }

  .socials{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.65s;
  }

  .social-link{
    --size:76px;
    width:var(--size);
    height:var(--size);
    border-radius:50%;
    border:1.4px solid var(--cream-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:var(--cream);
    position:relative;
    transition: transform .35s cubic-bezier(.2,.9,.3,1), background .35s ease, box-shadow .35s ease, border-color .35s ease;
  }

  .social-link svg{
    width:30px; height:30px;
    stroke:currentColor;
    fill:none;
    stroke-width:1.5;
    transition: stroke .35s ease, fill .35s ease;
  }

  .social-link .label{
    position:absolute;
    bottom:-28px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--cream-dim);
    white-space:nowrap;
    opacity:0.85;
    text-transform:uppercase;
  }

  .social-link:hover, .social-link:focus-visible{
    background:var(--cream);
    border-color:var(--cream);
    box-shadow:0 0 0 8px var(--shadow-glow), 0 10px 30px rgba(0,0,0,0.35);
    transform:translateY(-6px) scale(1.04);
    outline:none;
  }
  .social-link:hover svg, .social-link:focus-visible svg{
    stroke:var(--maroon-deep);
  }
  .social-link:hover .ig-fill, .social-link:focus-visible .ig-fill{
    fill:var(--maroon-deep);
  }

  .footer-note{
    margin-top:64px;
    font-size:12.5px;
    color:rgba(216,185,141,0.55);
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.85s;
    letter-spacing:0.3px;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .logo-wrap, .tagline, .divider, .socials, .footer-note{
      animation:none !important;
      opacity:1 !important;
      transform:none !important;
    }
  }

  @media (max-width:480px){
    .stage{ padding:40px 20px 56px; }
    .social-link{ --size:64px; }
    .social-link svg{ width:26px; height:26px; }
    .socials{ gap:22px; }
  }
</style>
</head>
